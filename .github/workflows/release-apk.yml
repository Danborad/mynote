name: release-apk

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v1.0.0
        required: true
        default: v1.0.0

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify APK
        run: |
          test -f releases/mynote-android-v1.0.0.apk
          sha256sum releases/mynote-android-v1.0.0.apk

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: MyNote ${{ steps.release.outputs.tag }}
          body: |
            MyNote Android APK.

            SHA256:
            `ffcba3c8881fd1da6b70417c9754d2ba8c571518db9fb3a24385428b5c3d33d3`
          files: releases/mynote-android-v1.0.0.apk
