name: release-apk

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag, for example v1.0.3
        required: true
        default: v1.0.3

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify APK
        id: apk
        shell: bash
        run: |
          apk_path="releases/mynote-android-${{ steps.release.outputs.tag }}.apk"
          test -f "$apk_path"
          sha256="$(sha256sum "$apk_path" | awk '{print $1}')"
          echo "path=$apk_path" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha256" >> "$GITHUB_OUTPUT"
          echo "$sha256  $apk_path"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: MyNote ${{ steps.release.outputs.tag }}
          body: |
            MyNote Android APK.

            SHA256:
            `${{ steps.apk.outputs.sha256 }}`
          files: ${{ steps.apk.outputs.path }}
